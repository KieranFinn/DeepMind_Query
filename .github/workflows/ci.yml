name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Validate test configuration
        run: |
          # Path validation: ensure pytest.ini exists in backend/ before running tests
          # This prevents tests from running in the wrong directory
          cd backend
          if [ ! -f "pytest.ini" ] && [ ! -f "pyproject.toml" ]; then
            echo "ERROR: No pytest.ini or pyproject.toml found in backend/"
            exit 1
          fi
          echo "Found test configuration in backend/"
          # Verify pytest.ini is present (not in root)
          if [ -f "../pytest.ini" ] || [ -f "../pyproject.toml" ]; then
            echo "WARNING: Found test config in root - ensure pytest runs from backend/ only"
          fi

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile main.py routes.py store.py db.py services/llm_service.py

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Start backend
        run: |
          cd backend
          python -m uvicorn main:app --port 8000 &
          sleep 3

      - name: Start frontend
        run: |
          cd frontend
          npm run dev &
          sleep 5

      - name: Install Playwright
        run: |
          cd frontend
          npx playwright install chromium

      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test tests/ -v || true
